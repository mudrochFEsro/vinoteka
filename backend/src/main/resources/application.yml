server:
  port: 8081

app:
  upload:
    dir: uploads

spring.servlet.multipart:
  max-file-size: 5MB
  max-request-size: 5MB

spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/shopapi
    username: shopapi
    password: shopapi
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/shopapi
          jwk-set-uri: http://localhost:8180/realms/shopapi/protocol/openid-connect/certs

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    oauth:
      client-id: shopapi-frontend
      use-pkce-with-authorization-code-grant: true
  oauth2:
    authorization-url: http://localhost:8180/realms/shopapi/protocol/openid-connect/auth
    token-url: http://localhost:8180/realms/shopapi/protocol/openid-connect/token
