services:
  postgres:
    image: postgres:16
    container_name: shopapi-postgres
    environment:
      POSTGRES_DB: shopapi
      POSTGRES_USER: shopapi
      POSTGRES_PASSWORD: shopapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopapi -d shopapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: shopapi-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/shopapi
      KC_DB_USERNAME: shopapi
      KC_DB_PASSWORD: shopapi
      KC_HTTP_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8180"
    volumes:
      - ./backend/keycloak/realms:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopapi-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/shopapi
      SPRING_DATASOURCE_USERNAME: shopapi
      SPRING_DATASOURCE_PASSWORD: shopapi
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8180/realms/shopapi
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopapi-frontend
    environment:
      PUBLIC_API_URL: http://localhost:8081/api
      PUBLIC_KEYCLOAK_URL: http://localhost:8180
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
